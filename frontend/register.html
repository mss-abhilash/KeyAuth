<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KeyAuth</title>
    <link rel="stylesheet" href="cyber-style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            <span class="nav-logo-text">Key<span>Auth</span></span>
        </a>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html" class="active">Register</a></li>
        </ul>
        
        <a href="register.html" class="nav-cta">Get Started</a>
        
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-page">
        <div class="auth-container register-container">
            <div class="auth-header">
                <div class="auth-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <h1>Create Account</h1>
                <p>Register with your unique typing pattern</p>
            </div>
            
            <!-- Step 1: Account Details -->
            <div id="step1">
                <form id="accountForm" class="auth-form">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                            <input type="text" id="username" placeholder="Choose a username" required minlength="3">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                            </svg>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                            <input type="password" id="password" placeholder="Create a password" required minlength="6">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary btn-full">
                        Continue to Typing Training
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                        </svg>
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>

            <!-- Step 2: Typing Sample Collection -->
            <div id="step2" style="display: none;">
                <div class="typing-instruction">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--accent-primary)">
                        <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/>
                    </svg>
                    <p>Type the phrase below <strong>10 times</strong> to train your unique typing pattern</p>
                </div>
                
                <div class="progress-section">
                    <div class="progress-label">
                        <span>Samples collected</span>
                        <span><span id="sampleCount">0</span> / 10</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                
                <div class="phrase-display" id="phraseDisplay">Loading phrase...</div>
                
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/>
                        </svg>
                        <input type="text" id="typingInput" placeholder="Type the phrase here..." autocomplete="off">
                    </div>
                </div>
                
                <p id="matchStatus" class="match-status"></p>
                
                <div class="button-group">
                    <button id="submitSampleBtn" class="btn-secondary" disabled>Submit Sample</button>
                    <button id="registerBtn" class="btn-primary btn-full" disabled>Complete Registration</button>
                </div>
                
                <div class="developer-tools">
                    <p class="dev-tools-label">Developer Tools:</p>
                    <button id="downloadSamplesBtn" class="btn-outline" type="button" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                        Download Samples
                    </button>
                    <input type="file" id="loadSamplesInput" accept=".json" style="display: none;">
                </div>
            </div>
            
            <p id="message" class="auth-message"></p>
        </div>
    </div>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile nav toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Account details storage
        let accountDetails = {};
        
        // Typing sample collection
        let REQUIRED_PHRASE = '';
        let currentKeystrokes = [];
        let allSamples = [];
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const message = document.getElementById('message');

        // Step 1: Account form submission
        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                message.textContent = 'Passwords do not match';
                message.className = 'auth-message error';
                return;
            }

            // Store account details for later
            accountDetails = { username, email, password };
            
            // Load phrase and switch to step 2
            await loadPhrase();
            step1.style.display = 'none';
            step2.style.display = 'block';
            message.textContent = '';
            
            // Focus typing input
            document.getElementById('typingInput').focus();
        });

        // Load phrase from API
        async function loadPhrase() {
            try {
                const res = await fetch('http://localhost:8000/phrase');
                const data = await res.json();
                REQUIRED_PHRASE = data.phrase;
                document.getElementById('phraseDisplay').textContent = REQUIRED_PHRASE;
            } catch (err) {
                REQUIRED_PHRASE = 'secure login verification';
                document.getElementById('phraseDisplay').textContent = REQUIRED_PHRASE;
            }
        }

        // Typing input event handlers
        const input = document.getElementById('typingInput');
        const submitBtn = document.getElementById('submitSampleBtn');
        const registerBtn = document.getElementById('registerBtn');
        const matchStatus = document.getElementById('matchStatus');
        const sampleCount = document.getElementById('sampleCount');
        const progressFill = document.getElementById('progressFill');

        input.addEventListener('keydown', (e) => {
            currentKeystrokes.push({
                key: e.key,
                type: 'down',
                time: performance.now()
            });
        });

        input.addEventListener('keyup', (e) => {
            currentKeystrokes.push({
                key: e.key,
                type: 'up',
                time: performance.now()
            });
            updateMatchStatus();
        });

        function updateMatchStatus() {
            const typed = input.value;
            if (typed === REQUIRED_PHRASE) {
                matchStatus.textContent = '✓ Phrase matches - Click "Submit Sample"';
                matchStatus.className = 'match-status match';
                submitBtn.disabled = false;
            } else {
                matchStatus.textContent = typed.length > 0 ? '✗ Keep typing...' : '';
                matchStatus.className = 'match-status no-match';
                submitBtn.disabled = true;
            }
        }

        function updateProgress() {
            sampleCount.textContent = allSamples.length;
            progressFill.style.width = `${(allSamples.length / 10) * 100}%`;
            
            // Enable download if we have any samples
            document.getElementById('downloadSamplesBtn').disabled = allSamples.length === 0;
            
            if (allSamples.length >= 10) {
                registerBtn.disabled = false;
                registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
            }
        }

        submitBtn.addEventListener('click', () => {
            if (input.value !== REQUIRED_PHRASE) return;

            allSamples.push([...currentKeystrokes]);
            currentKeystrokes = [];
            input.value = '';
            matchStatus.textContent = '';
            submitBtn.disabled = true;
            
            updateProgress();
            
            if (allSamples.length < 10) {
                message.textContent = `Sample ${allSamples.length} saved! Type the phrase again.`;
                message.className = 'auth-message success';
            } else {
                message.textContent = 'Ready! Click "Complete Registration" to finish.';
                message.className = 'auth-message success';
                input.disabled = true;
            }
        });

        registerBtn.addEventListener('click', async () => {
            if (allSamples.length < 10) {
                message.textContent = 'Need at least 10 samples';
                message.className = 'auth-message error';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';
            message.textContent = 'Creating account and training model...';
            message.className = 'auth-message info';

            try {
                const res = await fetch('http://localhost:8000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...accountDetails,
                        samples: allSamples
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    message.textContent = 'Account created! Redirecting to login...';
                    message.className = 'auth-message success';
                    
                    localStorage.setItem('username', accountDetails.username);
                    localStorage.setItem('user_id', data.user_id);
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    message.textContent = data.detail || 'Registration failed';
                    message.className = 'auth-message error';
                    registerBtn.disabled = false;
                    registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
                }
            } catch (err) {
                console.error('Registration error:', err);
                message.textContent = 'Backend server not reachable at localhost:8000. Please ensure the server is running.';
                message.className = 'auth-message error';
                registerBtn.disabled = false;
                registerBtn.textContent = `Complete Registration (${allSamples.length} samples)`;
            }
        });

        // Download samples as JSON
        document.getElementById('downloadSamplesBtn').addEventListener('click', () => {
            const data = {
                phrase: REQUIRED_PHRASE,
                samples: allSamples,
                timestamp: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `typing_samples_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            message.textContent = `Downloaded ${allSamples.length} samples`;
            message.className = 'auth-message success';
        });
    </script>
</body>
</html>
