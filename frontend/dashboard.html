<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - KeyAuth</title>
    <link rel="stylesheet" href="cyber-style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            <span class="nav-logo-text">Key<span>Auth</span></span>
        </a>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
        </ul>
        
        <a href="#" id="navLogoutBtn" class="nav-cta" onclick="logout()">Logout</a>
        
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Dashboard Container -->
    <div class="dashboard-page">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Authentication Result</h1>
            </div>
            
            <div id="statusBadge" class="status-badge"></div>
            
            <!-- Dual-factor display: Text + Rhythm -->
            <div class="dual-factor">
                <div class="factor-box">
                    <div class="factor-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/>
                        </svg>
                    </div>
                    <div class="factor-label">Text Match</div>
                    <div class="factor-value text" id="textMatch">100%</div>
                </div>
                <div class="factor-box">
                    <div class="factor-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/>
                        </svg>
                    </div>
                    <div class="factor-label">Typing Rhythm</div>
                    <div class="factor-value rhythm" id="rhythmMatch">--</div>
                </div>
            </div>
            
            <!-- Combined score -->
            <div class="combined-score">
                <div class="combined-label">Combined Authentication Score</div>
                <div class="combined-value" id="confidence">--</div>
            </div>
            
            <p class="help-text">
                Text match verifies <strong>what</strong> was typed.<br>
                Typing rhythm verifies <strong>how</strong> it was typed.
            </p>
            
            <div class="model-scores">
                <h3>Biometric Model Breakdown</h3>
                
                <div class="model-row">
                    <span class="model-name">One-Class SVM</span>
                    <div class="model-bar-container">
                        <div id="svmBar" class="model-bar svm"></div>
                    </div>
                    <span id="svmScore" class="model-score">--</span>
                </div>
                
                <div class="model-row">
                    <span class="model-name">Isolation Forest</span>
                    <div class="model-bar-container">
                        <div id="iforestBar" class="model-bar iforest"></div>
                    </div>
                    <span id="iforestScore" class="model-score">--</span>
                </div>
                
                <div class="model-row">
                    <span class="model-name">DTW Similarity</span>
                    <div class="model-bar-container">
                        <div id="dtwBar" class="model-bar dtw"></div>
                    </div>
                    <span id="dtwScore" class="model-score">--</span>
                </div>
            </div>
            
            <button onclick="window.location.href='login.html'" class="btn-primary btn-full">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                Back to Login
            </button>
        </div>
    </div>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile nav toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Logout function
        function logout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('verificationResult');
            window.location.href = 'login.html';
        }

        // Read result from localStorage
        const result = JSON.parse(localStorage.getItem('verificationResult'));

        if (result) {
            // Update status badge
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = result.status === 'verified' ? '✓ VERIFIED' : '✗ SUSPICIOUS';
            statusBadge.classList.add(result.status);
            
            // Text match is always 100% (phrase was matched before submission)
            document.getElementById('textMatch').textContent = '100%';
            
            // Typing rhythm = weighted confidence from biometric models
            const rhythmScore = (result.confidence * 100).toFixed(0);
            document.getElementById('rhythmMatch').textContent = rhythmScore + '%';
            
            // Combined score: average of text (100%) and rhythm
            const combinedScore = ((100 + parseFloat(rhythmScore)) / 2).toFixed(0);
            document.getElementById('confidence').textContent = combinedScore + '%';

            // Update model scores with animated bars
            if (result.model_scores) {
                const scores = result.model_scores;
                
                // Animate bars after a short delay
                setTimeout(() => {
                    if (scores.svm !== undefined) {
                        document.getElementById('svmBar').style.width = (scores.svm * 100) + '%';
                        document.getElementById('svmScore').textContent = (scores.svm * 100).toFixed(0) + '%';
                    }
                    if (scores.iforest !== undefined) {
                        document.getElementById('iforestBar').style.width = (scores.iforest * 100) + '%';
                        document.getElementById('iforestScore').textContent = (scores.iforest * 100).toFixed(0) + '%';
                    }
                    if (scores.dtw !== undefined) {
                        document.getElementById('dtwBar').style.width = (scores.dtw * 100) + '%';
                        document.getElementById('dtwScore').textContent = (scores.dtw * 100).toFixed(0) + '%';
                    }
                }, 100);
            }
        } else {
            document.getElementById('statusBadge').textContent = 'NO DATA';
        }
    </script>
</body>
</html>
